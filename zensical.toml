[project]
site_name = "Xolo"
site_description = "Python client, local policy engines, and development documentation for the Xolo access-control toolkit."
site_author = "Muyal Research Group"
site_url = "https://muyal-research-group.github.io/xolo/"
copyright = """
Copyright &copy; 2026 Muyal Research Group
"""
nav = [
  { "Overview" = "index.md" },
  { "Client guide" = "client.md" },
  { "API reference" = "api-reference.md" },
  { "Authentication" = "authentication.md" },
  { "Entity operations" = "entity-operations.md" },
  { "Development" = "development.md" },
]

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

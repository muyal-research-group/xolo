name: Run Unit Test via Pytest  
  
on:
  push: 
    branches: ["*"]
  pull_request:
    branches: ["*"]
    paths:
      - "xolo/**"
      - "tests/**"
      - "pyproject.toml"
  
  
jobs:  
  build:  
    runs-on: ubuntu-latest  
    env:
      XOLO_LOG_PATH: ${{ github.workspace }}/xolo/log
    strategy:  
      matrix:  
        python-version: ["3.10"]  
    steps:  
      - uses: actions/checkout@v3  
      - name: Set up Python ${{ matrix.python-version }}  
        uses: actions/setup-python@v4  
        with:  
          python-version: ${{ matrix.python-version }}  
      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
      - name: Prepare log folder
        run: |
          mkdir -p "${XOLO_LOG_PATH}"
      - name: Start Xolo Service
        run: |
          chmod +x deploy.sh && ./deploy.sh
      - name: List containers
        run: |
          docker ps -a
      - name: Configure Poetry
        run: |
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true  # Optional: keeps `.venv` inside project

      - name: Install Dependencies
        run: poetry install --no-interaction


      - name: Lint with Ruff  
        run: |  
          pip install ruff  
          ruff check .  
        continue-on-error: true  
        
      - name: Test with pytest  
        run: |  
          poetry run coverage run -m pytest  -v -s  
        env:
          LOG_PATH: ${{ env.XOLO_LOG_PATH }}
      - name: Generate Coverage Report  
        run: |  
          poetry run coverage report -m